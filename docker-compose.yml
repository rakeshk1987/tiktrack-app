services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
      - "9199:9199"
    volumes:
      - .:/app
      - /app/node_modules # Anonymous volume to bypass WDPassport noexec restriction!
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures Vite Hot Reload works across USB drive mounts
      - WDS_SOCKET_PORT=0
      - VITE_USE_FIREBASE_EMULATORS=true
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ ! -f node_modules/.bin/vite ] || [ ! -f node_modules/.bin/firebase ];
      then npm install --legacy-peer-deps --include=optional;
      fi &&
      npm run local
      "
