name: Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_APP_ENV: prod
          VITE_TELEGRAM_API_BASE_URL: ${{ vars.VITE_TELEGRAM_API_BASE_URL }}

  deploy_preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build preview bundle
        run: npm run build
        env:
          VITE_APP_ENV: prod
          VITE_TELEGRAM_API_BASE_URL: ${{ vars.VITE_TELEGRAM_API_BASE_URL }}

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIKTRACK_F112B }}
          projectId: tiktrack-f112b

  deploy_live:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build live bundle
        run: npm run build
        env:
          VITE_APP_ENV: prod
          VITE_TELEGRAM_API_BASE_URL: ${{ vars.VITE_TELEGRAM_API_BASE_URL }}

      - name: Deploy live site
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIKTRACK_F112B }}
          channelId: live
          projectId: tiktrack-f112b
