name: Telegram Prod Setup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_telegram_foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install app dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Validate required secrets
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON"
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_WEBHOOK_SECRET"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIKTRACK_F112B }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}

      - name: Prepare Firebase credentials
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIKTRACK_F112B }}

      - name: Deploy and configure Telegram prod
        run: npm run telegram:setup -- --deploy
        env:
          FIREBASE_PROJECT: tiktrack-f112b
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_MINI_APP_URL: https://tiktrack-f112b.web.app/telegram
